name: pro-build-check

on:
  workflow_dispatch:

concurrency:
  group: pro-build-check
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: fetch pro slot
        env:
          KANSOKU_PRO_REPO_URL: ${{ secrets.KANSOKU_PRO_REPO_URL }}
        run: scripts/fetch-pro.sh

      - name: assert pro slot present
        run: test -f apps/pro/src/index.ts

      - name: create overlay projections
        run: node packages/build-overlay/scripts/sync.mjs

      - name: check overlay projections
        run: node packages/build-overlay/scripts/sync.mjs --check

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: lint (pro overlays)
        run: pnpm --filter @kansoku/pro lint

      - name: typecheck
        run: pnpm -r typecheck

      - name: typecheck:pro
        run: pnpm typecheck:pro

      - name: build
        run: |
          pnpm --filter @kansoku/web build
          pnpm --filter @kansoku/desktop build

      - name: pro tests
        run: pnpm --filter @kansoku/pro test

      - name: generate synthetic bundle key (CI-only, not a real release key)
        run: echo "KANSOKU_BUNDLE_KEY=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: build pro (dist for packing)
        run: pnpm --filter @kansoku/pro build

      - name: pack pro (synthetic key — proves the pack pipeline works, not for distribution)
        env:
          KANSOKU_BUNDLE_KEY_ID: ci
        run: pnpm --filter @kansoku/pro pack

      - name: verify bundle commit combination (self-consistency only — not a pinned-combo check, see apps/desktop/scripts/verifyBundleCommit.mjs)
        run: |
          echo "this asserts bundle.json's publicCommit/proCommit match this job's checked-out HEADs — it cannot verify against the workspace superproject's separately-pinned known-good combination, which is out of scope here (see repos/kansoku-workspace/scripts/verify.sh)"
          apps/desktop/node_modules/.bin/tsx apps/desktop/scripts/verifyBundleCommit.mjs apps/pro/dist-enc/pro.enc

      - name: abi gate
        run: pnpm --filter @kansoku/pro abi:gate
